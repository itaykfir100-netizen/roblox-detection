<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Donations</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- Goal -->
        <div id="goal-container">
            <h2>GOAL</h2>
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div id="goal-text"></div>
        </div>

        <div class="columns">
            <!-- Live Donations -->
            <div class="column" id="live-donations">
                <h2>LIVE DONATIONS</h2>
            </div>

            <!-- Leaderboard -->
            <div class="column" id="leaderboard">
                <h2>LEADERBOARD</h2>
            </div>
        </div>
    </div>

    <!-- Notifications -->
    <div id="notifications"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-database.js";

const firebaseConfig = { databaseURL: "https://roblox-detection-default-rtdb.firebaseio.com/" };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const buyersRef = ref(db,"buyers");
const donationsRef = ref(db,"donations");
const statsRef = ref(db,"stats/totalRaised");
const goalRef = ref(db,"stats/goal");

// Get Roblox avatar
function getAvatar(userId){
    return `https://www.roblox.com/headshot-thumbnail/image?userId=${userId}&width=100&height=100&format=png`;
}

// 🟢 Live donations
onValue(donationsRef,(snapshot)=>{
    const data = snapshot.val();
    if(!data) return;

    const donations = Object.entries(data)
        .map(([id,d])=>({...d,id}))
        .sort((a,b)=>b.timestamp-a.timestamp)
        .slice(0,5);

    const liveDiv = document.getElementById("live-donations");
    liveDiv.innerHTML="<h2>LIVE DONATIONS</h2>";

    donations.forEach(d=>{
        const card = document.createElement("div");
        card.className="card";
        card.innerHTML=`
            <img class="avatar" src="${getAvatar(d.userId)}">
            <div class="donation-info">
                <div class="username">${d.username}</div>
                <div class="price">${d.price} Robux</div>
            </div>
        `;
        liveDiv.appendChild(card);
    });

    // Show notification for newest donation
    const newest = donations[0];
    showNotification(newest.username,newest.price,newest.userId);
});

// 🟢 Leaderboard
onValue(buyersRef,(snapshot)=>{
    const data = snapshot.val();
    if(!data) return;

    const users = Object.entries(data).map(([id,u])=>({...u,userId:id}))
        .sort((a,b)=>b.totalSpent-a.totalSpent)
        .slice(0,50);

    const leaderboardDiv = document.getElementById("leaderboard");
    leaderboardDiv.innerHTML="<h2>LEADERBOARD</h2>";

    users.forEach((u,i)=>{
        const card = document.createElement("div");
        card.className="card";
        card.innerHTML=`
            <img class="avatar" src="${getAvatar(u.userId)}">
            <div class="donation-info">
                <div class="username">#${i+1} ${u.username}</div>
                <div class="price">${u.totalSpent} Robux</div>
            </div>
        `;
        leaderboardDiv.appendChild(card);
    });
});

// 🟢 Goal
onValue(statsRef,(snapshot)=>{
    const total = snapshot.val() || 0;
    goalRef.on("value",g=>{
        const goal = g.val() || 1000000;
        updateGoal(total,goal);
    });
});

function updateGoal(total,goal){
    const percent = Math.min((total/goal)*100,100);
    document.getElementById("progress-fill").style.width = percent+"%";
    document.getElementById("goal-text").textContent = `Total Raised: ${total} / ${goal} Robux`;
}

// ⭐ Notifications
function showNotification(username,price,userId){
    const container = document.getElementById("notifications");
    const notif = document.createElement("div");
    notif.className="notification";
    notif.innerHTML=`
        <img class="avatar" src="${getAvatar(userId)}">
        <div>${username} donated ${price} Robux!</div>
    `;
    container.appendChild(notif);

    // Slide in/out animation
    setTimeout(()=>notif.classList.add("show"),50);
    setTimeout(()=>{
        notif.classList.remove("show");
        setTimeout(()=>container.removeChild(notif),500);
    },4000);
}
</script>
</body>
</html>
