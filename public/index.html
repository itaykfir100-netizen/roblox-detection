<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roblox Donations</title>

<link rel="stylesheet" href="style.css">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-database.js";

const firebaseConfig = {
databaseURL: "https://roblox-detection-default-rtdb.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const buyersRef = ref(db,"buyers");
const donationsRef = ref(db,"donations");
const statsRef = ref(db,"stats/totalRaised");


async function getAvatar(userId){

const res = await fetch(
`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${userId}&size=100x100&format=Png&isCircular=true`
);

const data = await res.json();

return data.data[0].imageUrl;

}


async function createCard(d){

const avatar = await getAvatar(d.userId);

const card = document.createElement("div");

card.className = "card new";

card.innerHTML = `
<img class="avatar" src="${avatar}">

<div class="info">
<div class="username">${d.username}</div>
<div class="price">${d.price} Robux</div>
</div>
`;

return card;

}


onValue(donationsRef, async (snapshot)=>{

const data = snapshot.val();

if(!data) return;

const donations = Object.values(data)
.sort((a,b)=>b.timestamp-a.timestamp)
.slice(0,5);

const container = document.getElementById("live-donations");

container.innerHTML = "<h2>LIVE DONATIONS</h2>";

for(const d of donations){

const card = await createCard(d);

container.appendChild(card);

}

});


onValue(buyersRef, async (snapshot)=>{

const data = snapshot.val();

if(!data) return;

const users = Object.values(data)
.sort((a,b)=>b.totalSpent-a.totalSpent)
.slice(0,50);

const leaderboard = document.getElementById("leaderboard");

leaderboard.innerHTML = "<h2>LEADERBOARD</h2>";

for(let i=0;i<users.length;i++){

const u = users[i];

const avatar = await getAvatar(u.userId);

const card = document.createElement("div");

card.className = "card";

card.innerHTML = `
<img class="avatar" src="${avatar}">
<div class="info">
<div class="username">#${i+1} ${u.username}</div>
<div class="price">${u.totalSpent} Robux</div>
</div>
`;

leaderboard.appendChild(card);

}


const top = users[0];

const avatar = await getAvatar(top.userId);

document.getElementById("top-donor-card").innerHTML = `
<img class="top-avatar" src="${avatar}">
<div class="top-name">${top.username}</div>
<div class="top-amount">${top.totalSpent} Robux</div>
`;

});


onValue(statsRef,(snapshot)=>{

const total = snapshot.val() || 0;

const goal = 1000000;

const percent = Math.min((total/goal)*100,100);

document.getElementById("progress-fill").style.width = percent + "%";

document.getElementById("goal-text").textContent =
`Total Raised: ${total} / ${goal} Robux`;

});

</script>

</head>

<body>

<div class="container">

<div id="goal-container">

<h2>GOAL</h2>

<div id="progress-bar">
<div id="progress-fill"></div>
</div>

<div id="goal-text"></div>

</div>

<div id="top-donor">

<h2>TOP DONATOR</h2>

<div id="top-donor-card"></div>

</div>

<div class="columns">

<div class="column" id="live-donations">

<h2>LIVE DONATIONS</h2>

</div>

<div class="column" id="leaderboard">

<h2>LEADERBOARD</h2>

</div>

</div>

</div>

</body>
</html>
