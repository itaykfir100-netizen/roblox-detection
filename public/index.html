<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Donations</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- Goal -->
        <div id="goal-container">
            <h2>GOAL</h2>
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div id="goal-text"></div>
        </div>

        <div class="columns">
            <!-- Live Donations -->
            <div class="column" id="live-donations">
                <h2>LIVE DONATIONS</h2>
            </div>

            <!-- Leaderboard -->
            <div class="column" id="leaderboard">
                <h2>LEADERBOARD</h2>
            </div>
        </div>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-database.js";

const firebaseConfig = { databaseURL: "https://roblox-detection-default-rtdb.firebaseio.com/" };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const buyersRef = ref(db, "buyers");
const donationsRef = ref(db, "donations");
const statsRef = ref(db, "stats/totalRaised");

// 🔹 Update live donations (last 50)
onValue(donationsRef, snapshot => {
    const data = snapshot.val() ? Object.entries(snapshot.val()).map(([k,v]) => ({...v,key:k})) : [];
    const liveDonations = data.sort((a,b) => b.timestamp - a.timestamp).slice(0,5);
    const liveDiv = document.getElementById("live-donations");
    liveDiv.innerHTML = "<h2>LIVE DONATIONS</h2>";
    liveDonations.forEach(d => {
        const card = document.createElement("div");
        card.className = "card";
        card.textContent = `${d.username} - ${d.price} Robux`;
        liveDiv.appendChild(card);
    });
});

// 🔹 Update leaderboard (top 50 users by totalSpent)
onValue(buyersRef, snapshot => {
    const data = snapshot.val() ? Object.values(snapshot.val()) : [];
    const leaderboard = data.sort((a,b) => b.totalSpent - a.totalSpent).slice(0,50);
    const leaderboardDiv = document.getElementById("leaderboard");
    leaderboardDiv.innerHTML = "<h2>LEADERBOARD</h2>";
    leaderboard.forEach((u,i) => {
        const card = document.createElement("div");
        card.className = "card";
        card.textContent = `${i+1}. ${u.username} - ${u.totalSpent} Robux`;
        leaderboardDiv.appendChild(card);
    });
});

// 🔹 Update goal
onValue(statsRef, snapshot => {
    const totalRaised = snapshot.val() || 0;
    const goal = 1000000;
    const fill = document.getElementById("progress-fill");
    const text = document.getElementById("goal-text");
    const percent = Math.min((totalRaised/goal)*100,100);
    fill.style.width = percent + "%";
    text.textContent = `Total Raised: ${totalRaised} / ${goal} Robux`;
});
</script>
</body>
</html>
