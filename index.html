<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Donations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- Goal -->
        <div id="goal-container">
            <h2>GOAL</h2>
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div id="goal-text"></div>
        </div>

        <div class="columns">
            <!-- Live Donations -->
            <div class="column" id="live-donations">
                <h2>LIVE DONATIONS</h2>
            </div>

            <!-- Leaderboard -->
            <div class="column" id="leaderboard">
                <h2>LEADERBOARD</h2>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-database.js";

        // 🔹 הגדרות Firebase
        const firebaseConfig = {
            databaseURL: "https://roblox-detection-default-rtdb.firebaseio.com/"
        };

        // 🔹 אתחול Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const donationsRef = ref(db, "donations");
        const statsRef = ref(db, "stats/totalRaised");

        // 🔹 מאזין לכל התרומות
        onValue(donationsRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const donationsArray = Object.values(data);

            // Live Donations 5 האחרונות לפי timestamp
            const liveDonations = donationsArray
                .sort((a, b) => b.timestamp - a.timestamp)
                .slice(0, 5);

            // Leaderboard 50 הראשונים לפי סכום כולל
            const leaderboardMap = {};
            donationsArray.forEach(d => {
                if (!leaderboardMap[d.userId]) {
                    leaderboardMap[d.userId] = { username: d.username, totalSpent: 0 };
                }
                leaderboardMap[d.userId].totalSpent += d.price;
            });
            const leaderboard = Object.values(leaderboardMap)
                .sort((a, b) => b.totalSpent - a.totalSpent)
                .slice(0, 50);

            updateLiveDonations(liveDonations);
            updateLeaderboard(leaderboard);
        });

        // 🔹 מאזין לסכום כולל
        onValue(statsRef, (snapshot) => {
            const totalRaised = snapshot.val() || 0;
            const goal = 1000000;
            updateGoal(totalRaised, goal);
        });

        // 🔹 עדכון Live Donations
        function updateLiveDonations(donations) {
            const liveDiv = document.getElementById("live-donations");
            liveDiv.innerHTML = "<h2>LIVE DONATIONS</h2>";
            donations.forEach(donation => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `${donation.username} - ${donation.price} Robux`;
                liveDiv.appendChild(card);
            });
        }

        // 🔹 עדכון Leaderboard
        function updateLeaderboard(users) {
            const leaderboardDiv = document.getElementById("leaderboard");
            leaderboardDiv.innerHTML = "<h2>LEADERBOARD</h2>";
            users.forEach((user, index) => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `${index + 1}. ${user.username} - ${user.totalSpent} Robux`;
                leaderboardDiv.appendChild(card);
            });
        }

        // 🔹 עדכון Goal
        function updateGoal(total, goal) {
            const fill = document.getElementById("progress-fill");
            const text = document.getElementById("goal-text");
            const percent = Math.min((total / goal) * 100, 100);
            fill.style.width = percent + "%";
            text.textContent = `סה"כ נתרמו: ${total} / ${goal} Robux`;
        }
    </script>
</body>
</html>
